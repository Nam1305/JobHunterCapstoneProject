services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dotnet_app
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "0.0.0.0:5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-353414358687-3qmkq863lr34fuuf9dp4nntlor21pjon.apps.googleusercontent.com}
    container_name: nextjs_app
    restart: always
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-353414358687-3qmkq863lr34fuuf9dp4nntlor21pjon.apps.googleusercontent.com}
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      - backend
    command: >
      sh -c "node -e \"const url = 'http://backend:8080/api/Dummy';
      (async () => {
        for (;;) {
          try {
            const response = await fetch(url);
            if (response.ok) break;
          } catch {}
          console.log('Waiting for backend...');
          await new Promise((resolve) => setTimeout(resolve, 2000));
        }
        console.log('Backend is up! Starting Next.js...');
      })().catch((error) => {
        console.error(error);
        process.exit(1);
      })\" && node server.js"
