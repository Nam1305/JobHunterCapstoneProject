services:
  ai-service:
    build: .
    container_name: ai-service
    ports:
      - "8000:8000"          # bind to host for dev; remove in prod (internal only)
    env_file: .env
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  app-network:
    # Set external: true to join an existing network defined by the .NET stack.
    # Leave as a local bridge during standalone development.
    driver: bridge
